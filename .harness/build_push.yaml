version: 1
kind: pipeline
spec:
  stages:
    - name: build
      type: ci
      spec:
        envs:
          HOME: /gitness
        steps:
          - name: login
            type: script
            spec:
              image: actions/docker:latest
              pull: if-not-exists
              run: docker_login "${{ secrets.get("dockerhub_username") }}" "${{ secrets.get("dockerhub_token") }}" 

          - name: build
            type: script
            spec:
              image: actions/docker:latest
              pull: if-not-exists
              run: |
                docker compose build
